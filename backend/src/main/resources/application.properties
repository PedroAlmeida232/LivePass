spring.application.name=livepass-backend

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Security
application.security.jwt.secret-key=${APPLICATION_SECURITY_JWT_SECRET_KEY}
application.security.jwt.expiration=${APPLICATION_SECURITY_JWT_EXPIRATION}
application.security.encryption-key=${APPLICATION_SECURITY_ENCRYPTION_KEY:12345678901234567890123456789012}

# PagBank (Deprecated)
application.pagbank.token=${PAGBANK_TOKEN}
application.pagbank.base-url=${PAGBANK_BASE_URL}
application.pagbank.webhook-key=${PAGBANK_WEBHOOK_KEY}

# Mercado Pago
application.mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN}
application.mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET}

